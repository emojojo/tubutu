<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玉米积温生长模拟器</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #fafafa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .simulator-container {
    background: white;
    padding: 80px 60px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    width: 900px;
  }
  .title {
    font-size: 26px;
    color: #4b5563;
    font-weight: 300;
    margin-bottom: 80px;
    letter-spacing: 1px;
  }
  .stages-track {
    display: flex;
    height: 90px;
    gap: 4px;
    margin-bottom: 20px;
  }
  .stage-box {
    border: 2px solid #d1d5db;
    border-radius: 6px;
    background: #f9fafb;
    position: relative;
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .stage-box.active {
    background: #60a5fa;
    border-color: #60a5fa;
  }
  .stage-box.completed {
    background: #93c5fd;
    border-color: #93c5fd;
  }
  .stage-label {
    position: absolute;
    top: -35px;
    font-size: 14px;
    color: #4b5563;
    white-space: nowrap;
    transition: all 0.3s;
  }
  .stage-box.active .stage-label {
    font-weight: bold;
    color: #1f2937;
  }
  .progress-container {
    position: relative;
    height: 4px;
    background: #f3f4f6;
    border-radius: 2px;
    margin-top: 15px;
  }
  .progress-bar {
    position: absolute;
    height: 100%;
    background: #60a5fa;
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }
  .pointer-container {
    position: absolute;
    top: 4px;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: left 0.1s linear;
  }
  .pointer-triangle {
    width: 0; 
    height: 0; 
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 8px solid #60a5fa;
    margin-bottom: 6px;
  }
  .pointer-text {
    color: #60a5fa;
    font-weight: bold;
    font-size: 18px;
    font-family: SF Pro Display, Arial, sans-serif;
  }
  .pointer-subtext {
    color: #9ca3af;
    font-size: 12px;
    margin-top: 2px;
  }
  
  /* Slider */
  .slider-container {
    margin-top: 100px;
    text-align: center;
  }
  input[type=range] {
    width: 80%;
    accent-color: #60a5fa;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="simulator-container">
  <div class="title">玉米积温生长模拟器</div>
  
  <div class="stages-track" id="track">
    <!-- Boxes will be injected here -->
  </div>
  
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
    <div class="pointer-container" id="pointer">
      <div class="pointer-triangle"></div>
      <div class="pointer-text" id="pointerValue">0.0</div>
      <div class="pointer-subtext">当前有效积温</div>
    </div>
  </div>
  
  <div class="slider-container">
    <input type="range" id="gddSlider" min="0" max="2600" value="988" step="1">
    <div style="margin-top: 15px; color: #9ca3af; font-size: 14px;">左右拖动滑块模拟积温变化</div>
  </div>
</div>

<script>
  // Data identical to what we fixed in data.js
  const stages = [
    { name: '出苗期', gdd: 150 },
    { name: '拔节期', gdd: 350 },
    { name: '大喇叭口期', gdd: 350 },
    { name: '抽雄吐丝期', gdd: 250 },
    { name: '乳熟采收期', gdd: 500 },
    { name: '完熟期', gdd: 1000 }
  ];
  const totalGdd = 2600;
  
  const track = document.getElementById('track');
  const slider = document.getElementById('gddSlider');
  const progressBar = document.getElementById('progressBar');
  const pointer = document.getElementById('pointer');
  const pointerValue = document.getElementById('pointerValue');
  
  // Initialize UI boxes proportionally
  stages.forEach(stage => {
    const box = document.createElement('div');
    box.className = 'stage-box';
    // Use flex-grow based on GDD to make width proportional
    box.style.flex = stage.gdd;
    
    const label = document.createElement('div');
    label.className = 'stage-label';
    label.innerText = stage.name;
    
    box.appendChild(label);
    track.appendChild(box);
  });
  
  function updateUI() {
    const currentGdd = parseFloat(slider.value);
    pointerValue.innerText = currentGdd.toFixed(1);
    
    const percent = Math.min((currentGdd / totalGdd) * 100, 100);
    progressBar.style.width = percent + '%';
    pointer.style.left = percent + '%';
    
    let accumulated = 0;
    const boxes = document.querySelectorAll('.stage-box');
    
    boxes.forEach((box, index) => {
      const stageGdd = stages[index].gdd;
      const stageStart = accumulated;
      const stageEnd = accumulated + stageGdd;
      
      box.classList.remove('completed', 'active');
      
      if (currentGdd >= stageEnd) {
        box.classList.add('completed'); // Past this stage
      } else if (currentGdd >= stageStart && currentGdd < stageEnd) {
        box.classList.add('active'); // Currently in this stage
      }
      
      accumulated += stageGdd;
    });
  }
  
  slider.addEventListener('input', updateUI);
  updateUI(); // Run once on load
</script>

</body>
</html>
