<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土不土生态农场 | 开启种植生活</title>
    <meta name="description" content="告别繁琐的农业术语，根据你所在的城市，定制最轻松的从种子到餐桌的种植计划。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=63">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <header class="hero">
        <div class="top-left-nav">
            <div class="nav-label">📍 种植地区:</div>
            <div class="custom-select-wrapper nav-select">
                <div class="custom-select" id="custom-region-select">
                    <div class="select-trigger" id="region-select-trigger">
                        <span class="trigger-text">请选择地区</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="custom-options" id="region-options">
                        <!-- populated by js -->
                    </div>
                </div>
            </div>
        </div>

        <div class="top-right-nav" id="auth-container">
            <button id="show-login-modal-btn" class="auth-btn">
                <span style="margin-right:5px;">👤</span> 登录 / 注册
            </button>
            <div id="user-info" style="display:none; align-items:center; gap:10px;">
                <img id="user-avatar" src="" alt="Avatar" style="width:32px; height:32px; border-radius:50%; border:2px solid white;">
                <span id="user-name" style="color:white; font-size:0.9rem; font-weight:500;"></span>
                <button id="logout-btn" class="auth-btn" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 10px; border-radius:15px; cursor:pointer;">退出</button>
            </div>
        </div>

        <div class="hero-content">
            <div class="logo-container">
                <img src="images/logo_tubutu_premium.png" alt="土不土" class="site-logo">
            </div>
            
            <div class="search-container">
                <input type="text" id="main-search" class="search-input" placeholder="🔍 搜索蔬菜或病虫害 (如: 白菜、蚜虫)...">
            </div>
            
            <div id="region-desc" class="region-desc" style="margin-top: 15px; font-size: 0.9rem; color: rgba(255,255,255,0.9); text-shadow: 0 1px 3px rgba(0,0,0,0.3);"></div>
        </div>
    </header>

    <main class="container">
        <!-- Main Tabs -->
        <div class="main-tabs">
            <button class="main-tab-btn" data-target="mygarden-section">🧑‍🌾 我的菜园</button>
            <button class="main-tab-btn active" data-target="veg-section">🥗 蔬果种植</button>
            <button class="main-tab-btn" data-target="fert-section">💩 自制肥料</button>
            <button class="main-tab-btn" data-target="protection-section">🛡️ 生态防虫</button>
            <button class="main-tab-btn" data-target="model-section">🔄 循环农业模型</button>
            <button class="main-tab-btn" data-target="calendar-section">📅 农事日历</button>
        </div>

        <div id="veg-section">
            <section class="filter-section">
                <div class="category-filters" id="category-filters">
                <button class="filter-btn active" data-id="all">全部蔬果</button>
                <!-- Categories will be populated by JS -->
            </div>
        </section>

        <section class="vegetable-grid" id="vegetable-grid">
            <!-- Vegetable cards will be populated by JS -->
        </section>
        </div>

        <!-- Fertilizer Section -->
        <div id="fert-section" class="tab-content" style="display: none;">
            <section class="fertilizer-section">
                <p style="color: var(--text-muted); text-align: center; margin-bottom: 30px;">自给自足的生态循环体系，让你的植物更健康。</p>
                <div class="vegetable-grid" id="fert-grid">
                    <!-- Fertilizer cards will be populated by JS -->
                </div>
            </section>
        </div>

        <!-- Protection Section -->
        <div id="protection-section" class="tab-content" style="display: none;">
            <div class="vegetable-grid" id="protection-grid">
                <!-- Pest control cards will be dynamically generated here -->
            </div>
        </div>

        <!-- Farming Models Section -->
        <div id="model-section" class="tab-content" style="display: none;">
            <div class="vegetable-grid" id="model-grid">
                <!-- Farming models cards will be dynamically generated here -->
            </div>
        </div>

        <!-- New Calendar Section -->
        <div id="calendar-section" class="tab-content" style="display: none;">
            <section class="calendar-wrapper">
                <p style="color: var(--text-muted); text-align: center; margin-bottom: 30px;">
                    根据当前选择的地区 <strong id="calendar-region-name"></strong>，生成全年月历。
                </p>
                <div class="calendar-grid" id="calendar-grid">
                    <!-- Calendar months will be populated by JS -->
                </div>
            </section>
        </div>

        <!-- My Garden Section -->
        <div id="mygarden-section" class="tab-content" style="display: none;">
            <div style="display: flex; justify-content: center; gap: 15px; margin-top: 10px; margin-bottom: 20px;">
                <button class="sub-tab-btn active" id="btn-show-active">🌱 种植中</button>
                <button class="sub-tab-btn" id="btn-show-history">🏆 收获历史</button>
            </div>
            
            <div id="mygarden-active-view">
                <section class="filter-section" id="mygarden-filter-section" style="display: none; margin-bottom: -10px;">
                    <div class="category-filters" id="mygarden-category-filters">
                        <button class="mygarden-filter-btn filter-btn active" data-id="all">全部蔬果</button>
                        <!-- Categories will be populated by JS -->
                    </div>
                </section>
                <section class="mygarden-wrapper" style="padding: 20px 0;">
                    <p style="color: var(--text-muted); text-align: center; margin-bottom: 30px; font-size: 1.1rem;" id="mygarden-empty-msg">
                        你的菜园空空如也，快去“蔬果种植”里挑选想种的植物吧！
                    </p>
                    <div class="vegetable-grid" id="mygarden-grid">
                        <!-- My Garden cards will be populated by JS -->
                    </div>
                </section>
            </div>

            <div id="mygarden-history-view" style="display: none;">
                <section class="filter-section" id="history-filter-section" style="display: none; margin-bottom: -10px;">
                    <div class="category-filters" id="history-category-filters">
                        <button class="history-filter-btn filter-btn active" data-id="all">全部蔬果</button>
                        <!-- Categories will be populated by JS -->
                    </div>
                </section>
                <section class="history-wrapper" style="padding: 20px 0;">
                    <p style="color: var(--text-muted); text-align: center; margin-bottom: 30px; font-size: 1.1rem;" id="history-empty-msg">
                        暂无收获历史，继续努力种植吧！
                    </p>
                    <div class="vegetable-grid" id="history-grid">
                        <!-- History cards will be populated by JS -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <button class="close-btn" id="close-btn">&times;</button>
            <div class="modal-content" id="modal-content">
                <!-- Modal content will be populated by JS -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 土不土生态农场 | 种下种子，收获生活</p>
    </footer>

    <!-- Login Modal -->
    <div class="modal-overlay" id="login-modal-overlay">
        <div class="modal" style="max-width: 400px; text-align: center; padding: 20px;">
            <button class="close-btn" id="login-close-btn">&times;</button>
            <h2 style="margin-top: 0; margin-bottom: 20px; color: #1b4332;">登录 / 注册</h2>
            
            <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px;">
                <input type="email" id="auth-email" placeholder="邮箱地址" style="padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem;">
                <input type="password" id="auth-password" placeholder="密码 (最少6位)" style="padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem;">
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button type="button" id="email-login-btn" class="primary-btn" style="flex: 1; padding: 12px; font-size: 1rem; border-radius: 8px;">登 录</button>
                <button type="button" id="email-register-btn" style="flex: 1; padding: 12px; font-size: 1rem; border-radius: 8px; background: #f0f0f0; color: #333; border: 1px solid #ccc; cursor: pointer;">注 册</button>
            </div>

            <div style="display: flex; align-items: center; margin: 20px 0;">
                <div style="flex: 1; height: 1px; background: #eee;"></div>
                <div style="padding: 0 10px; color: #999; font-size: 0.9rem;">或</div>
                <div style="flex: 1; height: 1px; background: #eee;"></div>
            </div>

            <button type="button" id="google-login-btn" class="auth-btn" style="width: 100%; justify-content: center; padding: 12px; font-size: 1rem; border: 1px solid #ddd;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width:20px;height:20px;margin-right:10px;">
                使用 Google 账号继续
            </button>
        </div>
    </div>

    <!-- Operation Modal -->
    <div class="modal-overlay" id="op-modal-overlay">
        <div class="modal op-glass-modal" id="op-modal">
            <button class="close-btn" id="op-close-btn">&times;</button>
            <div class="op-modal-header">
                <h3>添加农事记录</h3>
                <p>记录植物成长的点滴</p>
            </div>
            
            <div class="op-form-content">
                <div class="op-form-group">
                    <label>应用到作物（可多选）</label>
                    <div class="op-crop-selector-container" id="op-crop-selector">
                        <!-- JS将在此处动态生成作物标签 -->
                    </div>
                </div>

                <div class="op-form-group">
                    <label>操作日期</label>
                    <input type="date" id="op-date-input" class="op-input">
                </div>
                
                <div class="op-form-group">
                    <label>操作类型</label>
                    <div class="op-type-grid" id="op-type-selector">
                        <div class="op-type-btn active" data-type="water">
                            <img src="assets/icons/op_water.png?v=1" class="op-icon-large" style="width:36px; height:36px; object-fit:contain; margin-bottom:4px;"><span class="op-type-text">浇水</span>
                        </div>
                        <div class="op-type-btn" data-type="weed">
                            <img src="assets/icons/op_weed.png?v=1" class="op-icon-large" style="width:36px; height:36px; object-fit:contain; margin-bottom:4px;"><span class="op-type-text">除草</span>
                        </div>
                        <div class="op-type-btn" data-type="fertilize">
                            <img src="assets/icons/op_fertilize.png?v=1" class="op-icon-large" style="width:36px; height:36px; object-fit:contain; margin-bottom:4px;"><span class="op-type-text">施肥</span>
                        </div>
                        <div class="op-type-btn" data-type="pest">
                            <img src="assets/icons/op_pest.png?v=1" class="op-icon-large" style="width:36px; height:36px; object-fit:contain; margin-bottom:4px;"><span class="op-type-text">杀虫</span>
                        </div>
                        <div class="op-type-btn" data-type="prune">
                            <img src="assets/icons/op_prune.png?v=1" class="op-icon-large" style="width:36px; height:36px; object-fit:contain; margin-bottom:4px;"><span class="op-type-text">修剪</span>
                        </div>
                        <div class="op-type-btn" data-type="trellis">
                            <img src="assets/icons/op_trellis.png?v=1" class="op-icon-large" style="width:36px; height:36px; object-fit:contain; margin-bottom:4px;"><span class="op-type-text">搭架</span>
                        </div>
                        <div class="op-type-btn" data-type="pollinate">
                            <img src="assets/icons/op_pollinate.png?v=1" class="op-icon-large" style="width:36px; height:36px; object-fit:contain; margin-bottom:4px;"><span class="op-type-text">授粉</span>
                        </div>
                        <div class="op-type-btn" data-type="other">
                            <img src="assets/icons/op_other.png?v=1" class="op-icon-large" style="width:36px; height:36px; object-fit:contain; margin-bottom:4px;"><span class="op-type-text">其他</span>
                        </div>
                    </div>
                </div>
                
                <div class="op-form-group">
                    <label>备注内容 <span style="font-size: 0.8rem; color: #94a3b8; font-weight: normal;">(选填)</span></label>
                    <textarea id="op-remark-input" rows="3" class="op-input op-textarea" placeholder="记录一下今天的细节，例如：施了自制厨余堆肥..."></textarea>
                </div>
                
                <button id="op-save-btn" class="op-submit-btn">保存记录</button>
            </div>
        </div>
    </div>

    <!-- Image Lightbox Modal -->
    <div class="modal-overlay" id="image-lightbox-overlay" style="z-index: 3000; align-items: center; justify-content: center;">
        <div style="position: relative; max-width: 90vw; max-height: 90vh;">
            <button class="close-btn" id="lightbox-close-btn" style="position: absolute; top: -40px; right: 0; color: white; background: none; border: none; font-size: 2rem; cursor: pointer;">&times;</button>
            <img id="lightbox-img" src="" style="max-width: 100%; max-height: 90vh; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); object-fit: contain;">
        </div>
    </div>

    <script type="module" src="app.js?v=1780082772012"></script>
</body>
</html>
